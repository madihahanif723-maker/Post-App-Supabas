<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav class="navbar">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">POST APP</span>
      <div class="d-flex" role="search">
        <input class="form-control me-2" type="search" id="searchInput" placeholder="Search" aria-label="Search" />
        <button class="btn btn-outline-success" type="submit" onclick="searchPosts()">Search</button>
      </div>

      <div class="d-flex align-items-center gap-3">
        <div class="avatar-dropdown-wrapper">
          <button type="button" class="google-avatar-btn" id="char" onclick="toggleProfileMenu(event)">?</button>

          <div class="profile-floating-menu" id="profileMenu">
            <div class="menu-user-info">
              <h6 id="menuUserName" class="m-0 font-weight-bold" style="color: var(--text-white);">Loading...</h6>
              <p id="menuUserEmail" class="text-muted small m-0">email@example.com</p>
            </div>
            <hr class="dropdown-divider bg-secondary my-2">
            <button class="logout-menu-btn" id="logoutBtn">🚪 Logout</button>
          </div>
        </div>
        <button id="theme-toggle" class="btn">🌙 Light Mode</button>
      </div>

    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <div class="col-sm-12 col-md-6 col-lg-4">
        <div class="card p-3 m-2">
          <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" />
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
          </div>
          <div class="mb-3 d-flex images justify-content-around align-items-center">
            <img class="bgImg" onclick="selectImg('images/1.avif', event)" src="images/1.avif" alt="">
            <img class="bgImg" onclick="selectImg('images/2.jpg', event)" src="images/2.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/3.avif', event)" src="images/3.avif" alt="">
            <img class="bgImg" onclick="selectImg('images/4.jpg', event)" src="images/4.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/5.avif', event)" src="images/5.avif" alt="">
            <label class="btn btn-primary m-0 d-flex align-items-center justify-content-center"
              style="width: 40px; height: 40px;" for="background-image"> + </label>
            <input type="file" id="background-image" class="d-none" accept="image/*">
          </div>

          <div id="imagePreviewContainer" class="mb-3" style="display: none; text-align: center;">
            <label
              style="color: #a5b4fc; font-size: 13px; display: block; margin-bottom: 5px; text-align: left;">Selected
              Image Preview:</label>
            <div id="imagePreview"
              style="width: 100px; height: 100px; background-size: cover; background-position: center; border-radius: 8px; border: 2px solid #a855f7; margin: 0 auto;">
            </div>
          </div>
          <button onclick="post(event)" type="button" class="btn btn-primary ms-auto" id="postBtn">
            Post
          </button>
        </div>
      </div>
      <div class="col-sm-12 col-md-6 col-lg-8">
        <div id="posts" class="posts m-2"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>

</html>
